<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AR Experience</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>

<model-viewer 
    src="https://giri2005.github.io/AR-Images/Fig.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-placement="floor"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    min-scale="0.5"
    max-scale="2">

    <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
        View in AR
    </button>

</model-viewer>

<style>
body { margin: 0; }
model-viewer {
    width: 100%;
    height: 100vh;
    background-color: #f0f0f0;
}
</style>

</body>
</html>
